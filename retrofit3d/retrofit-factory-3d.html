<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Retrofit Factory 3D — Old Bakery Plant</title>
<style>
:root{
  --bg:#0e1217; --panel:#161d26; --panel2:#1e2836; --edge:#2b3a4a; --ink:#dfe8f0;
  --dim:#8598ac; --amber:#ffb23e; --green:#3ad17a; --red:#ff5a5a; --blue:#49a6ff;
  --cyan:#38d6cf; --gold:#e8c15a;
  --mono:'SFMono-Regular',ui-monospace,Consolas,Menlo,monospace;
  --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
  overflow:hidden;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative}

/* ---- top HUD ---- */
#hud{display:flex;align-items:center;gap:2px;background:var(--panel);border-bottom:1px solid var(--edge);
  padding:7px 8px;flex-wrap:wrap}
.stat{flex:1;min-width:0;text-align:center;padding:1px 2px}
.stat b{display:block;font-family:var(--mono);font-size:15px;font-weight:700;line-height:1.1}
.stat span{font-size:8.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
#cashv.good{color:var(--green)} #cashv.warn{color:var(--amber)} #cashv.bad{color:var(--red)}
#shipv.bad{color:var(--red)} #shipv.good{color:var(--green)}
#relv.good{color:var(--green)} #relv.warn{color:var(--amber)} #relv.bad{color:var(--red)}

/* ---- day / speed bar ---- */
#daybar{display:flex;align-items:center;gap:6px;background:var(--panel2);border-bottom:1px solid var(--edge);padding:5px 8px}
#dayprog{flex:1;height:8px;background:#0a0e13;border-radius:5px;overflow:hidden;border:1px solid var(--edge)}
#dayfill{height:100%;width:0;background:linear-gradient(90deg,#2c6a8f,#49a6ff);transition:width .12s linear}
.spd{background:var(--panel);border:1px solid var(--edge);color:var(--dim);border-radius:6px;
  width:34px;height:28px;font-family:var(--mono);font-size:12px;font-weight:700}
.spd.on{color:var(--ink);border-color:var(--blue);background:#12233a}
#clock{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:70px}

/* ---- factory viewport ---- */
#stage{flex:1;position:relative;overflow:hidden;background:
  radial-gradient(120% 90% at 50% 8%,#182231 0%,#0e1217 70%)}
#floor{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);touch-action:none}
.mlabel{font-family:var(--mono);font-size:9px;fill:var(--dim)}
.mname{font-family:var(--mono);font-size:10px;font-weight:700}
.tp-hit{cursor:pointer}
.sel-ring{fill:none;stroke:var(--cyan);stroke-width:2;stroke-dasharray:4 4;opacity:0}
.bottleneck-badge{font-family:var(--mono);font-size:8px;font-weight:700;fill:#0e1217}

/* alert pips over stage */
#alerts{position:absolute;left:8px;top:8px;right:8px;display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:5}
.alert{background:#2a1414;border:1px solid #7a2c2c;color:#ffb0b0;font-size:11px;border-radius:7px;
  padding:5px 9px;box-shadow:0 3px 12px #0008;animation:slidein .2s;pointer-events:auto}
.alert.info{background:#12233a;border-color:#2c5a8a;color:#bcd8f5}
.alert.good{background:#12351f;border-color:#2c7a48;color:#bff0cf}
@keyframes slidein{from{transform:translateY(-8px);opacity:0}}
#toast{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:var(--panel2);
  border:1px solid var(--edge);border-radius:8px;padding:8px 14px;font-size:12px;z-index:8;
  box-shadow:0 6px 20px #0009;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}

/* tech status chip */
#techchip{position:absolute;right:8px;bottom:8px;background:var(--panel2);border:1px solid var(--edge);
  border-radius:8px;padding:6px 9px;font-size:10px;z-index:6;max-width:60%;line-height:1.35}
#techchip b{color:var(--cyan)}

/* ---- bottom action sheet ---- */
#sheet{position:absolute;left:0;right:0;bottom:0;background:var(--panel);border-top:1px solid var(--edge);
  border-radius:14px 14px 0 0;transform:translateY(102%);transition:transform .22s cubic-bezier(.3,.7,.3,1);
  z-index:20;max-height:74%;overflow:auto;box-shadow:0 -8px 30px #000a}
#sheet.open{transform:translateY(0)}
.sheet-head{display:flex;align-items:center;gap:8px;padding:12px 14px 6px}
.sheet-head .mi{width:34px;height:34px;border-radius:8px;flex:0 0 auto}
.sheet-head h3{margin:0;font-size:15px;flex:1}
.sheet-head .crit{font-size:9px;color:var(--dim)}
.sheet-close{background:none;border:none;color:var(--dim);font-size:22px;padding:0 4px}
.mstat-row{display:flex;flex-wrap:wrap;gap:5px;padding:2px 14px 8px}
.chip{background:var(--panel2);border:1px solid var(--edge);border-radius:6px;padding:3px 7px;font-size:10px;color:var(--dim)}
.chip b{color:var(--ink);font-family:var(--mono)}
.chip.warn b{color:var(--amber)} .chip.bad b{color:var(--red)} .chip.good b{color:var(--green)}
/* condition (per-channel) */
.cond{padding:2px 14px 6px}
.cond h4{margin:6px 0 4px;font-size:10px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase}
.chan{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}
.chan .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar{width:96px;height:9px;background:#0a0e13;border-radius:5px;overflow:hidden;border:1px solid var(--edge);flex:0 0 auto}
.bar i{display:block;height:100%}
.chan .pf{font-family:var(--mono);font-size:9px;width:58px;text-align:right;color:var(--dim)}
.hidden-note{font-size:10px;color:var(--dim);font-style:italic;padding:2px 0 6px}
/* actions */
.acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 14px 16px}
.act{background:var(--panel2);border:1px solid var(--edge);border-radius:10px;padding:10px;text-align:left;color:var(--ink)}
.act:disabled{opacity:.4}
.act .t{font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:baseline}
.act .t .cost{font-family:var(--mono);font-size:11px;color:var(--amber)}
.act .d{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.3}
.act.primary{border-color:#2c7a48;background:#12281c}
.act.danger{border-color:#7a4a2c}
.act.buy .t .cost{color:var(--green)}

/* ---- modal (review / win / help) ---- */
#modal{position:absolute;inset:0;background:#000b;display:none;align-items:center;justify-content:center;z-index:30;padding:14px}
#modal.show{display:flex}
.card{background:var(--panel);border:1px solid var(--edge);border-radius:14px;width:100%;max-width:420px;
  padding:16px 18px;max-height:88%;overflow:auto;box-shadow:0 12px 40px #000c}
.card h2{margin:0 0 3px;font-size:18px}
.card .sub{color:var(--dim);font-size:12px;margin-bottom:12px}
.ledger{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
.ledger td{padding:4px 2px;border-bottom:1px solid #1a232e}
.ledger td:last-child{text-align:right;font-family:var(--mono)}
.ledger .pos{color:var(--green)} .ledger .neg{color:var(--red)}
.ledger .tot td{border-top:2px solid var(--edge);border-bottom:none;font-weight:700;padding-top:7px}
.grade{font-size:44px;font-weight:800;text-align:center;margin:6px 0}
.btn{display:block;width:100%;background:var(--panel2);border:1px solid var(--edge);color:var(--ink);
  border-radius:10px;padding:12px;font-size:14px;font-weight:700;margin-top:8px}
.btn.go{background:#12351f;border-color:#2c7a48;color:var(--green)}
.help-body{font-size:12.5px;line-height:1.55;color:var(--ink)}
.help-body b{color:var(--gold)} .help-body .k{color:var(--cyan)}
.help-body ul{padding-left:18px;margin:8px 0}
#helpbtn{position:absolute;left:8px;top:calc(50% - 200px);z-index:6;background:var(--panel2);
  border:1px solid var(--edge);color:var(--dim);border-radius:50%;width:30px;height:30px;font-weight:700}
.tut{position:absolute;left:12px;right:12px;bottom:88px;background:#12233a;border:1px solid var(--blue);
  border-radius:10px;padding:10px 12px;z-index:9;font-size:12.5px;line-height:1.45;box-shadow:0 6px 20px #0009}
.tut b{color:var(--blue)} .tut .x{float:right;color:var(--dim);background:none;border:none;font-size:16px;margin:-2px -2px 0 0}
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat"><b id="cashv">$8,000</b><span>Cash</span></div>
    <div class="stat"><b id="dayv">1/10</b><span>Day</span></div>
    <div class="stat"><b id="shipv">0</b><span>Shipped / 800</span></div>
    <div class="stat"><b id="relv">—</b><span>Fleet health</span></div>
    <div class="stat"><b id="strikev">0/3</b><span>Strikes</span></div>
  </div>
  <div id="daybar">
    <div id="clock">Day 1 · 06:00</div>
    <div id="dayprog"><div id="dayfill"></div></div>
    <button class="spd" data-s="0" id="sp0">❚❚</button>
    <button class="spd on" data-s="1" id="sp1">1×</button>
    <button class="spd" data-s="2" id="sp2">2×</button>
    <button class="spd" data-s="4" id="sp4">4×</button>
  </div>

  <div id="stage">
    <svg id="floor" width="640" height="440" viewBox="0 0 640 440"></svg>
    <div id="alerts"></div>
    <button id="helpbtn">?</button>
    <div id="techchip">🔧 <b id="techstate">Idle</b><div id="techqueue"></div></div>
    <div id="toast"></div>
    <div class="tut" id="tut" style="display:none">
      <button class="x" id="tutx">×</button>
      <span id="tuttext"></span>
    </div>
  </div>

  <div id="sheet"></div>

  <div id="modal"><div class="card" id="modalcard"></div></div>
</div>

<script>
"use strict";
/* =========================================================================
   RETROFIT FACTORY 3D — playable browser prototype of the GDD (retrofit3d/GDD.md)
   Faithful to the tuned economy: a fault is DATA, not code. Wear, breakdowns and
   the compressor→pneumatics cascade all emerge from per-channel wear + a shared
   air bus, read through the effParam chokepoint. Numbers = the canonical §5/§24.
   ========================================================================= */

// ---- tuned constants (GDD §24) ----
const C = {
  TICKS_PER_DAY:480, D_MAX:10, ALPHA:2.0, MU:3.0, KAPPA:6.0,
  P_NOM:7.0, P_MIN:4.0, LAMBDA_LEAK:0.35, M0:0.05, M_SEAL:0.75,
  AIR_DRAW:32, COMP_CAP:40,
  STARTING_CASH:8000, WIN_CASH:20000, PRICE:3.50, SALVAGE:1.20,
  CONTRACT_DEMAND:800, CONTRACT_FLOOR:400, SHORT_SHIP_PENALTY:600,
  ENERGY_PRICE:0.18, TECH_WAGE_DAY:240, OVERHEAD_DAY:110,
  TRAVEL_MIN:15, INSPECT_MIN:30,
  EMERGENCY_PART_MULT:2.5, EMERGENCY_DELIVERY_MIN:180,
  LABOR_REPAIR:150, LABOR_EMERGENCY_MULT:2.0,
  CASCADE_DAMAGE:400, WIP_SCRAP_RATE:40,
  UPGRADE_COST:1500, UPGRADE_TIER:1.4, AUTOMATE_COST:1200,
  REPAIR_FLOOR:0.08, SIGMA_INSPECT:0.05,
  STRIKES_TO_LOSE:3, HEALTH_CONDEMN:0.15, WEAR_SCALE:0.85, HAZARD_SCALE:0.4,
};

// ---- seeded PRNG (deterministic) ----
let _seed = 1234567 >>> 0;
function rnd(){ _seed=(_seed*1664525+1013904223)>>>0; return _seed/4294967296; }
function gauss(){ let u=0,v=0; while(u===0)u=rnd(); while(v===0)v=rnd(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }

// channel types: DRAG (full rate loss), SEIZE (half rate, drives hazard), DRIFT/LEAK (energy), MOIST (air bus)
// canonical machines (GDD §5). w0 = preseed wear so max(w)=1-startH.
const DEFS = [
  { id:'mixer', name:'Spiral Mixer', code:'MIX-100', col:2, row:2, base:210, energy:2.5, risk:0.06, crit:4,
    pneumatic:true, deps:['compressor'], replaceCost:2600, color:'#5b7fa8',
    ch:[
      {id:'bearing', nm:'Main shaft bearing', type:'DRAG', k:0.00010, w:0.28, part:260},
      {id:'belt',    nm:'Drive V-belt',       type:'SEIZE',k:0.00013, w:0.20, part:45},
      {id:'seal',    nm:'Bowl-lift air seal',  type:'DRIFT',k:0.00011, w:0.18, part:70, moist:true},
    ]},
  { id:'conveyor', name:'Feed Conveyor', code:'CNV-200', col:4.5, row:2, base:155, energy:1.2, risk:0.12, crit:5,
    pneumatic:false, deps:['mixer'], replaceCost:2400, color:'#6a6f7a',
    ch:[
      {id:'belt',    nm:'Belt tension/track',  type:'SEIZE',k:0.00020, w:0.42, part:120},
      {id:'roller',  nm:'Idler roller bearing', type:'DRAG', k:0.00013, w:0.25, part:55},
      {id:'reducer', nm:'Gear reducer',        type:'DRIFT',k:0.00010, w:0.20, part:180},
    ]},
  { id:'oven', name:'Tunnel Oven', code:'OVN-300', col:7.5, row:2, base:140, energy:14, risk:0.09, crit:5,
    pneumatic:false, deps:['conveyor'], replaceCost:4200, color:'#b5713e',
    ch:[
      {id:'element', nm:'Heater element',      type:'DRAG', k:0.00016, w:0.45, part:210},
      {id:'gasket',  nm:'Door/oven gasket',    type:'DRIFT',k:0.00013, w:0.25, part:95},
      {id:'thermo',  nm:'Thermocouple drift',  type:'SEIZE',k:0.00009, w:0.15, part:60},
    ]},
  { id:'slicer', name:'Reciprocating Slicer', code:'SLC-400', col:9, row:3, base:180, energy:2, risk:0.07, crit:3,
    pneumatic:true, deps:['oven','compressor'], replaceCost:2000, color:'#7a8a5b',
    ch:[
      {id:'blade',  nm:'Blade sharpness',      type:'DRAG', k:0.00010, w:0.20, part:40},
      {id:'crank',  nm:'Blade-drive crank',    type:'DRIFT',k:0.00009, w:0.18, part:85},
      {id:'pusher', nm:'Pneumatic pusher seal', type:'SEIZE',k:0.00016, w:0.32, part:50, moist:true},
    ]},
  { id:'packager', name:'Bagger / Sealer', code:'PKG-500', col:10, row:5, base:165, energy:2.8, risk:0.05, crit:3,
    pneumatic:true, deps:['slicer','compressor'], replaceCost:2300, color:'#8a6f9a',
    ch:[
      {id:'sealbar', nm:'Heat-seal bar',       type:'DRIFT',k:0.00010, w:0.22, part:65},
      {id:'gripper', nm:'Pneumatic gripper seal',type:'SEIZE',k:0.00016, w:0.37, part:55, moist:true},
      {id:'film',    nm:'Film-feed roller',    type:'DRAG', k:0.00009, w:0.20, part:45},
    ]},
  { id:'compressor', name:'Air Compressor', code:'CMP-900', col:1, row:7, base:40, energy:6, risk:0.08, crit:5,
    pneumatic:false, deps:[], utility:true, replaceCost:3000, color:'#4a7a8a',
    ch:[
      {id:'moist',   nm:'Air dryer / moisture', type:'MOIST', k:0.00020, w:0.39, part:75},
      {id:'leak',    nm:'Header air leak',      type:'LEAK', k:0.00016, w:0.20, part:35},
      {id:'valve',   nm:'Piston ring & valve',  type:'SEIZE',k:0.00014, w:0.25, part:320},
    ]},
];
const CHAIN = ['mixer','conveyor','oven','slicer','packager']; // serial value chain (compressor = utility)

// ---- runtime state ----
let S, MACH, tech;
function machById(id){ return MACH[id]; }
function machHealth(m){ let mn=1; for(const c of m.ch) mn=Math.min(mn,1-c.w); return mn; }
function worstChan(m){ let w=null; for(const c of m.ch) if(!w||c.w>w.w) w=c; return w; }

function newGame(){
  _seed=1234567>>>0;
  MACH={};
  for(const d of DEFS){
    const m={ ...d, ch:d.ch.map(c=>({...c, w0:c.w, reveal:null, revealHazard:null})),
      up:1, automated:false, broken:false, brokenChan:null, downMins:0,
      awaitDelivery:0, stocked:false, effRate:d.base, rate:0, u:0, replaced:false };
    MACH[d.id]=m;
  }
  // per-machine lambda0 so day-1 breakdown prob == risk (F4)
  for(const id in MACH){ const m=MACH[id]; const H0=machHealth(m);
    m.lambda0 = -Math.log(1-m.risk)/C.TICKS_PER_DAY / Math.exp(C.KAPPA*(1-H0)); }
  tech={ busy:false, job:null, queue:[], atPrev:null, phase:'idle', timer:0, minsToday:0 };
  S={ cash:C.STARTING_CASH, day:1, tick:0, strikes:0, contractLive:true, over:false, won:false,
    // daily accumulators
    produced:0, energyToday:0, downMinToday:0, scrapWipMin:0,
    airP:C.P_NOM, moisture:0, airFactor:1, T:0, bottleneck:'oven',
    speed:1, sel:null, tutStep:0, msgs:[] };
  buildFloor(); selectNone(); updateHUD(); renderTech(); tutorialStep();
}

/* =============================== SIM CORE =============================== */
// F5 air bus (solved first)
function solveAir(){
  const cmp=MACH.compressor;
  if(cmp.broken){ S.airP=0; S.moisture=1; S.airFactor=0; return; }
  const wLeak=cmp.ch.find(c=>c.id==='leak').w;
  const wMoist=cmp.ch.find(c=>c.id==='moist').w;
  const wValve=cmp.ch.find(c=>c.id==='valve').w;
  const dragScale=1-0.5*wValve;                 // volumetric eff loss (piston/valve wear)
  const capNow=C.COMP_CAP*Math.max(0.2,dragScale);
  const draw=C.AIR_DRAW;                          // nominal system demand ~32 SCFM
  S.airP=C.P_NOM*(1-C.LAMBDA_LEAK*wLeak)*Math.min(1,capNow/draw);
  S.moisture=Math.min(1,C.M0+C.M_SEAL*wMoist);
  S.airFactor=clamp((S.airP-C.P_MIN)/(C.P_NOM-C.P_MIN),0,1);
}
// F3 effParam — pure read
function effRate(m){
  if(m.broken) return 0;
  let r=m.base*m.up;
  for(const c of m.ch){
    const g=m.automated?0.85:1;                 // automate slightly softens rate impact too
    if(c.type==='DRAG')  r*=(1-g*c.w);
    if(c.type==='SEIZE') r*=(1-0.5*g*c.w);
  }
  return Math.max(0,r);
}
function effPower(m){
  let p=m.energy;
  for(const c of m.ch){ if(c.type==='DRIFT'||c.type==='LEAK') p*=(1+c.w); }
  return p;
}
// F7/F8 throughput
function solveThroughput(){
  for(const id in MACH){ const m=MACH[id]; m.effRate=effRate(m);
    m.rate = m.effRate*(m.pneumatic?S.airFactor:1)*(m.broken?0:1); }
  let T=Infinity, bn='oven';
  for(const id of CHAIN){ const m=MACH[id]; if(m.rate<T){T=m.rate;bn=id;} }
  if(T===Infinity)T=0;
  S.T=T; S.bottleneck=bn;
  // duty = how hard THIS machine works vs what it can currently do: bottleneck pins at u=1
  // (the wear hotspot); upgrading it raises T, drops its u, and moves the limit (whack-a-mole).
  for(const id in MACH){ const m=MACH[id]; m.u = m.utility? 0.8 : clamp(T/Math.max(1,m.effRate),0,1); }
}
// F1 wear
function advanceWear(){
  for(const id in MACH){ const m=MACH[id];
    if(m.broken){ continue; }
    const u=m.u;
    for(const c of m.ch){
      const S_ = c.moist? (1+C.MU*S.moisture):1;
      const k = (m.automated? c.k*0.4 : c.k)*C.WEAR_SCALE;   // predictive/automate cuts wear rate
      c.w=clamp(c.w + k*Math.pow(u,C.ALPHA)*S_, 0, 1);
    }
  }
}
// F4 breakdowns
function rollBreakdowns(){
  for(const id in MACH){ const m=MACH[id];
    if(m.broken || (tech.job&&tech.job.mid===id&&tech.phase==='work')) continue;
    const H=machHealth(m);
    const lam=m.lambda0*Math.exp(C.KAPPA*(1-H))*C.HAZARD_SCALE;
    const p=1-Math.exp(-lam);
    if(rnd()<p){ seize(m); }
  }
}
function seize(m){
  const c=worstChan(m); c.w=1;
  m.broken=true; m.brokenChan=c;
  const fail=FAILMTTR[m.id];
  m.awaitDelivery = m.stocked?0:C.EMERGENCY_DELIVERY_MIN;
  m.downMins = fail*60;
  m.stocked=false;
  // reactive emergency repair auto-dispatched (plant reacts). Charged as emergency.
  enqueue({mid:m.id, type:'emergency', chan:c.id});
  S.cash -= C.CASCADE_DAMAGE;
  alert('⛔ '+m.code+' SEIZED — '+c.nm+'. Emergency call-out.','');
  if(m.id==='compressor') alert('Air pressure lost — all pneumatic machines will stall!','');
  chirp('bad');
}
// daily settlement
function settleDay(){
  const shipped=Math.min(C.CONTRACT_DEMAND,S.produced);
  const over=Math.max(0,S.produced-C.CONTRACT_DEMAND);
  let revenue = S.contractLive ? (shipped*C.PRICE + over*C.SALVAGE) : (S.produced*C.SALVAGE);
  const wipScrap=(S.scrapWipMin/60)*C.WIP_SCRAP_RATE;
  const energy=S.energyToday;
  let penalty=0, struck=false;
  if(S.produced<C.CONTRACT_FLOOR && S.contractLive){ penalty=C.SHORT_SHIP_PENALTY; S.strikes++; struck=true; }
  const net = revenue - energy - C.TECH_WAGE_DAY - C.OVERHEAD_DAY - wipScrap - penalty;
  S.cash += net;
  const ledger={ day:S.day, produced:Math.round(S.produced), shipped:Math.round(shipped),
    revenue, energy, wages:C.TECH_WAGE_DAY, overhead:C.OVERHEAD_DAY, wipScrap, penalty, struck, net,
    down:(S.downMinToday/60) };
  // reset daily accumulators
  S.produced=0; S.energyToday=0; S.downMinToday=0; S.scrapWipMin=0; tech.minsToday=0;
  if(S.strikes>=C.STRIKES_TO_LOSE && S.contractLive){ S.contractLive=false; }
  return ledger;
}

// ---- MTTR tables (GDD §5) ----
const SERVICE_MTTR={mixer:2,conveyor:2,oven:2,slicer:1,packager:1.5,compressor:2};
const FAILMTTR   ={mixer:4,conveyor:3.5,oven:3,slicer:2.5,packager:2,compressor:5};

/* =============================== TECHNICIAN =============================== */
function enqueue(job){ // job: {mid,type,chan?}
  if(job.type==='emergency'){ tech.queue.unshift(job); } else tech.queue.push(job);
  if(!tech.busy) startNext();
  renderTech();
}
function startNext(){
  if(tech.queue.length===0){ tech.busy=false; tech.job=null; tech.phase='idle'; renderTech(); return; }
  tech.busy=true; tech.job=tech.queue.shift();
  tech.phase='travel'; tech.timer=(tech.atPrev===tech.job.mid?4:C.TRAVEL_MIN);
  renderTech();
}
function advanceTech(){
  if(!tech.busy) return;
  const j=tech.job, m=MACH[j.mid];
  tech.timer--; tech.minsToday++;
  if(tech.phase==='travel'){
    if(tech.timer<=0){
      tech.atPrev=j.mid;
      if(j.type==='emergency' && m.awaitDelivery>0){ tech.phase='wait'; tech.timer=m.awaitDelivery; }
      else beginWork(j,m);
    }
    return;
  }
  if(tech.phase==='wait'){ if(tech.timer<=0) beginWork(j,m); return; }
  // work
  if(tech.phase==='work'){
    if(m.broken){ S.downMinToday++; S.scrapWipMin++; } // machine down during emergency teardown
    else if(j.type==='repair'||j.type==='upgrade'||j.type==='replace'||j.type==='automate'){ S.downMinToday++; S.scrapWipMin++; }
    if(tech.timer<=0) finishJob(j,m);
  }
}
function beginWork(j,m){
  tech.phase='work';
  if(j.type==='inspect') tech.timer=C.INSPECT_MIN;
  else if(j.type==='emergency') tech.timer=FAILMTTR[m.id]*60;
  else if(j.type==='repair') tech.timer=SERVICE_MTTR[m.id]*60;
  else if(j.type==='upgrade') tech.timer=180;
  else if(j.type==='automate') tech.timer=150;
  else if(j.type==='replace') tech.timer=SERVICE_MTTR[m.id]*60+120;
  if(j.type==='repair'||j.type==='replace') m.broken=false; // planned service takes it down cleanly
  renderTech();
}
function finishJob(j,m){
  if(j.type==='inspect'){
    for(const c of m.ch){ c.reveal=clamp(c.w+gauss()*C.SIGMA_INSPECT,0,1);
      const H=1-c.w; c.revealHazard=(m.lambda0*Math.exp(C.KAPPA*(1-machHealth(m)))*C.TICKS_PER_DAY); }
    alert('🔍 Inspection done: '+m.code+' condition revealed.','info');
    if(m.id==='compressor'&&m.ch.find(c=>c.id==='moist').w>0.5)
      alert('Compressor moisture is HIGH — it is feeding seal wear on Mixer/Slicer/Packager.','info');
  } else if(j.type==='emergency'){
    for(const c of m.ch) c.w=Math.min(c.w,C.REPAIR_FLOOR);
    m.broken=false; m.brokenChan=null; m.downMins=0;
    for(const c of m.ch){ c.reveal=c.w; }
    alert('✅ '+m.code+' back online (emergency repair).','good'); chirp('good');
  } else if(j.type==='repair'){
    for(const c of m.ch) c.w=Math.min(c.w,C.REPAIR_FLOOR);
    for(const c of m.ch){ c.reveal=c.w; }
    m.broken=false;
    alert('✅ '+m.code+' serviced — health restored.','good'); chirp('good');
  } else if(j.type==='upgrade'){
    m.up*=C.UPGRADE_TIER;
    alert('⬆ '+m.code+' upgraded — capacity ×1.4 ('+Math.round(m.base*m.up)+'/hr).','good'); chirp('good');
  } else if(j.type==='automate'){
    m.automated=true;
    for(const c of m.ch) c.w=Math.min(c.w,C.REPAIR_FLOOR);
    alert('🤖 '+m.code+' condition-monitored — wear rate cut, seals sealed.','good'); chirp('good');
  } else if(j.type==='replace'){
    for(const c of m.ch){ c.w=0.0; c.reveal=0; } m.up=Math.max(m.up,1.1); m.replaced=true; m.broken=false;
    alert('🆕 '+m.code+' replaced — like new (+10% capacity).','good'); chirp('good');
  }
  tech.atPrev=j.mid; startNext();
  if(S.sel===j.mid) openSheet(j.mid);
  updateHUD();
}

/* =============================== TICK LOOP =============================== */
function stepTick(){
  solveAir(); solveThroughput(); advanceWear(); rollBreakdowns(); advanceTech();
  // economy accrual (per tick)
  const perMin=S.T/60;                            // loaves this minute (T is loaves/hr)
  // oven thermocouple silent under-bake: scrap a fraction of output
  const th=MACH.oven.ch.find(c=>c.id==='thermo'); const scrapFrac=MACH.oven.broken?0:Math.min(0.35,th.w*0.4);
  S.produced += perMin*(1-scrapFrac);
  let kw=0; for(const id in MACH){ const m=MACH[id]; if(!m.broken && (m.utility||S.T>0.1)) kw+=effPower(m); }
  S.energyToday += kw*(1/60)*C.ENERGY_PRICE;
  // day boundary
  S.tick++;
  if(S.tick>=C.TICKS_PER_DAY){ S.tick=0; const led=settleDay();
    if(checkLose()) return;
    if(S.day>=C.D_MAX){ endGame(led); return; }
    S.day++; S.speed=0; setSpeed(0); showReview(led); tutorialStep(); }
  updateHUD();
}
function checkLose(){
  if(S.cash<0){ endGame(null,'L1'); return true; }
  if(S.strikes>=C.STRIKES_TO_LOSE){ endGame(null,'L2'); return true; }
  let sum=0,n=0; for(const id in MACH){ sum+=machHealth(MACH[id]); n++; }
  if(sum/n<C.HEALTH_CONDEMN){ endGame(null,'L3'); return true; }
  return false;
}

  S.cash-=m.inspectionCost; enqueue({mid:id,type:'inspect'}); toast('Inspector dispatched to '+m.code); openSheet(id); }

function actUpgrade(id){ if(!canPay(C.UPGRADE_COST)){toast('Need $'+C.UPGRADE_COST);return;}
  S.cash-=C.UPGRADE_COST; enqueue({mid:id,type:'upgrade'}); toast('⬆ Upgrade queued '+MACH[id].code); updateHUD(); openSheet(id); }
function actAutomate(id){ if(MACH[id].automated){toast('Already automated');return;} if(!canPay(C.AUTOMATE_COST)){toast('Need $'+C.AUTOMATE_COST);return;}
  S.cash-=C.AUTOMATE_COST; enqueue({mid:id,type:'automate'}); toast('🤖 Condition-monitoring queued '+MACH[id].code); updateHUD(); openSheet(id); }
function actReplace(id){ const m=MACH[id]; if(!canPay(m.replaceCost)){toast('Need $'+m.replaceCost);return;}
  S.cash-=m.replaceCost; enqueue({mid:id,type:'replace'}); toast('🆕 Replacement queued '+m.code); updateHUD(); openSheet(id); }

/* =============================== RENDER: FLOOR =============================== */
const NS='http://www.w3.org/2000/svg';
const TW=54, TH=27, OX=120, OY=40;
function iso(col,row){ return [OX+(col-row)*TW/2 + 200, OY+(col+row)*TH/2]; }
let floorEls={};
function el(tag,attrs,parent){ const e=document.createElementNS(NS,tag); for(const k in attrs) e.setAttribute(k,attrs[k]); if(parent)parent.appendChild(e); return e; }
function buildFloor(){
  const svg=document.getElementById('floor'); svg.innerHTML=''; floorEls={};
  // floor tiles
  const g=el('g',{},svg);
  for(let r=0;r<8;r++)for(let cc=0;cc<12;cc++){ const [x,y]=iso(cc,r);
    const p=`${x},${y+TH/2} ${x+TW/2},${y} ${x+TW},${y+TH/2} ${x+TW/2},${y+TH}`;
    el('polygon',{points:p,fill:(cc+r)%2?'#141b24':'#111821',stroke:'#0c1119','stroke-width':0.5},g);
  }
  // machines
  for(const d of DEFS){ drawMachine(d); }
  // technician avatar
  floorEls.tech=el('circle',{r:5,fill:'#38d6cf',stroke:'#0e1217','stroke-width':1.5},svg);
  floorEls.techG=svg;
  positionTech();
}
function drawMachine(d){
  const svg=document.getElementById('floor');
  const [x,y]=iso(d.col,d.row);
  const g=el('g',{class:'tp-hit'},svg); g.addEventListener('click',()=>openSheet(d.id));
  const cx=x+TW/2, cy=y+TH/2, h=30;
  // iso cuboid: top diamond + left + right faces
  const top=`${cx},${cy-14} ${cx+22},${cy} ${cx},${cy+14} ${cx-22},${cy}`;
  const left=`${cx-22},${cy} ${cx},${cy+14} ${cx},${cy+14+h} ${cx-22},${cy+h}`;
  const right=`${cx},${cy+14} ${cx+22},${cy} ${cx+22},${cy+h} ${cx},${cy+14+h}`;
  const shade=(hex,f)=>{ const n=parseInt(hex.slice(1),16); let R=(n>>16)*f,G=((n>>8)&255)*f,B=(n&255)*f;
    return '#'+[R,G,B].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); };
  const sel=el('polygon',{class:'sel-ring',points:`${cx},${cy-20} ${cx+30},${cy} ${cx},${cy+20} ${cx-30},${cy}`},g);
  const pR=el('polygon',{points:right,fill:shade(d.color,0.62)},g);
  const pL=el('polygon',{points:left,fill:shade(d.color,0.8)},g);
  const pT=el('polygon',{points:top,fill:d.color,stroke:'#0e1217','stroke-width':1},g);
  // health ring
  const ring=el('circle',{cx:cx,cy:cy-24,r:8,fill:'#0a0e13',stroke:'#2b3a4a','stroke-width':2},g);
  const arc=el('circle',{cx:cx,cy:cy-24,r:8,fill:'none',stroke:'#3ad17a','stroke-width':3,
    'stroke-dasharray':'50','stroke-dashoffset':0,transform:`rotate(-90 ${cx} ${cy-24})`},g);
  // state icon
  const icon=el('text',{x:cx,y:cy-20,'text-anchor':'middle','font-size':9,fill:'#0e1217','font-weight':700},g);
  const bn=el('text',{x:cx,y:cy+h+22,'text-anchor':'middle',class:'bottleneck-badge',fill:'#ffb23e'},g);
  const name=el('text',{x:cx,y:cy+h+12,'text-anchor':'middle',class:'mlabel'},g); name.textContent=d.code;
  floorEls[d.id]={top:pT,left:pL,right:pR,arc,icon,sel,bn,g,cx,cy,h,color:d.color,shade};
}
function positionTech(){
  const t=floorEls.tech; if(!t) return;
  let col=5,row=7; // crib
  if(tech.busy&&tech.job){ const m=MACH[tech.job.mid];
    if(tech.phase==='travel'){ const frac=1-tech.timer/C.TRAVEL_MIN;
      col=5+(m.col-5)*frac; row=7+(m.row-7)*frac; }
    else { col=m.col-0.4; row=m.row+0.4; } }
  const [x,y]=iso(col,row); t.setAttribute('cx',x+TW/2); t.setAttribute('cy',y+TH/2-2);
}
function renderFloor(){
  for(const d of DEFS){ const m=MACH[d.id], f=floorEls[d.id]; if(!f) continue;
    const H=machHealth(m);
    let col=d.color;
    if(m.broken) col='#8a2a2a';
    else if(H<0.35) col='#a05a2a';
    const shade=f.shade;
    f.top.setAttribute('fill',col);
    f.left.setAttribute('fill',shade(col,0.8)); f.right.setAttribute('fill',shade(col,0.62));
    // health ring
    const dash=50, off=dash*(1-H); f.arc.setAttribute('stroke-dashoffset',off);
    f.arc.setAttribute('stroke', H>0.5?'#3ad17a':H>0.25?'#ffb23e':'#ff5a5a');
    // icon: down / servicing / running
    const servicing = tech.busy&&tech.job&&tech.job.mid===d.id;
    f.icon.textContent = m.broken?'✖':servicing?'🔧':(S.bottleneck===d.id&&S.T>0?'':'');
    f.bn.textContent = (S.bottleneck===d.id && !m.broken && CHAIN.includes(d.id))?'◄ LIMIT':'';
    f.sel.setAttribute('opacity', S.sel===d.id?1:0);
    f.g.style.filter = m.broken?'drop-shadow(0 0 6px #ff5a5a)':(servicing?'drop-shadow(0 0 5px #38d6cf)':'none');
  }
  positionTech();
}

let _alerts=[];
function alert(msg,cls){ const box=$('alerts'); const d=document.createElement('div'); d.className='alert '+(cls||'');
  d.textContent=msg; box.appendChild(d); setTimeout(()=>{d.style.opacity=0;setTimeout(()=>d.remove(),300);}, 4200);
  while(box.children.length>4) box.removeChild(box.firstChild); }
let _tt;
function toast(m){ const t=$('toast'); t.textContent=m; t.style.opacity=1; clearTimeout(_tt); _tt=setTimeout(()=>t.style.opacity=0,1600); }
let AC=null;
function chirp(kind){ try{ if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),g=AC.createGain(); o.connect(g); g.connect(AC.destination);
  const t=AC.currentTime; if(kind==='good'){o.frequency.setValueAtTime(560,t);o.frequency.setValueAtTime(760,t+0.09);}
  else{o.frequency.setValueAtTime(300,t);o.frequency.setValueAtTime(200,t+0.12);}
  g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(t);o.stop(t+0.4);}catch(e){} }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }

  $('modal').classList.add('show');
}
function row(label,val,pos){ return '<tr><td>'+label+'</td><td class="'+(val>=0?'pos':'neg')+'">'+money(val)+'</td></tr>'; }
function closeReview(){ $('modal').classList.remove('show'); updateHUD(); }
function endGame(l,lose){
  S.over=true; setSpeed(0);
  const rev=$('modalcard'); let grade,gc,title,sub,body='';
  if(lose){ grade='✗'; gc='var(--red)';
    title = lose==='L1'?'BANKRUPT':lose==='L2'?'CONTRACT CANCELLED':lose==='L3'?'PLANT CONDEMNED':'OBJECTIVE FAILED';
    sub = lose==='L1'?'Cash went below zero.':lose==='L2'?'Three short-ship days — the bakery pulled the contract.':
      lose==='L3'?'Fleet average health fell below 15%. The plant is unsafe.':'Day 10 ended under the $20,000 target.';
  } else {
    const cash=S.cash; S.won=cash>=C.WIN_CASH;
    if(cash>=28000&&S.strikes===0){grade='★★★';gc='var(--gold)';}
    else if(cash>=24000&&S.strikes===0){grade='★★';gc='var(--green)';}
    else if(cash>=C.WIN_CASH){grade='★';gc='var(--green)';}
    else {grade='✗';gc='var(--red)';}
    title=S.won?'CONTRACT KEPT':'OBJECTIVE FAILED';
    sub='Finished Day 10 with '+money(cash)+' (target $20,000).';
  }
  rev.innerHTML='<h2>'+title+'</h2><div class="sub">'+sub+'</div>'+
    '<div class="grade" style="color:'+gc+'">'+grade+'</div>'+
    '<table class="ledger">'+
    '<tr><td>Final cash</td><td>'+money(S.cash)+'</td></tr>'+
    '<tr><td>Started with</td><td>$8,000</td></tr>'+
    '<tr class="tot"><td>Net over 10 days</td><td class="'+(S.cash-8000>=0?'pos':'neg')+'">'+money(S.cash-8000)+'</td></tr>'+
    '<tr><td>Short-ship strikes</td><td>'+S.strikes+'/3</td></tr>'+
    '<tr><td>Fleet health</td><td>'+Math.round(avgHealth()*100)+'%</td></tr>'+
    '</table>'+ body +
    '<button class="btn go" onclick="restart()">▶ New run</button>';
  $('modal').classList.add('show');
}
function avgHealth(){ let s=0,n=0; for(const id in MACH){s+=machHealth(MACH[id]);n++;} return s/n; }
function restart(){ $('modal').classList.remove('show'); newGame(); setSpeed(1); }

/* =============================== TUTORIAL =============================== */
const TUT=[
 '<b>Welcome.</b> You inherited a worn-out bakery line. Ship <b>800 loaves/day</b> and finish Day 10 with <b>$20,000</b> cash. The catch: every machine is aging, and you have <b>one</b> technician.',
 '<b>The oven is your bottleneck</b> (◄ LIMIT badge). Throughput = the slowest machine, so nothing ships faster than the oven bakes. Tap the oven to see its options.',
 '<b>You can\'t see wear until you look.</b> Tap a machine → <span class="k">🔍 Inspect</span> ($25–60, no downtime) to reveal which part is failing. Guessing wastes parts.',
 '<b>The compressor is a trap.</b> Its moisture (💧) silently speeds up seal wear on the Mixer, Slicer AND Packager. Ignore it and three machines fail at once. Inspect the compressor early.',
];
function tutorialStep(){
  if(S.tutStep>=TUT.length){ $('tut').style.display='none'; return; }
  if(S.day===1 && S.tutStep<TUT.length){ $('tuttext').innerHTML=TUT[S.tutStep]; $('tut').style.display='block'; }
}
$('tutx').onclick=()=>{ S.tutStep++; if(S.tutStep>=TUT.length){$('tut').style.display='none';} else tutorialStep(); };

/* =============================== MAIN LOOP =============================== */
let acc=0,last=performance.now(),raf;
const TPS={0:0,1:12,2:24,4:48}; // ticks per second by speed
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.25)dt=0.25;
  if(!S.over && S.speed>0){ acc+=dt*TPS[S.speed];
    let guard=0; while(acc>=1 && guard++<200){ stepTick(); acc-=1; if(S.over)break; } }
  renderTech(); if(!$('modal').classList.contains('show')) {}
  requestAnimationFrame(frame);
}
function setSpeed(s){ S.speed=s; document.querySelectorAll('.spd').forEach(b=>b.classList.toggle('on',+b.dataset.s===s)); }
document.querySelectorAll('.spd').forEach(b=>b.onclick=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} setSpeed(+b.dataset.s); });
$('helpbtn').onclick=()=>{ setSpeed(0); const rev=$('modalcard');
  rev.innerHTML='<h2>How to play</h2><div class="help-body">'+
   '<b>Goal:</b> finish <span class="k">Day 10</span> with <b>$20,000</b> cash. Ship 800 loaves/day; three days under 400 cancels the contract.'+
   '<ul>'+
   '<li><b>Wear is hidden.</b> <span class="k">Inspect</span> to reveal per-part condition (no downtime).</li>'+
   '<li><b>Repair</b> takes a machine down now to avoid a costly breakdown later. A breakdown = 2.5× parts, 3h delivery, +$400 damage.</li>'+
   '<li><b>Bottleneck</b> = slowest machine (◄ LIMIT). Upgrade it to ship more — but faster line speed wears everything quicker, and the limit moves.</li>'+
   '<li><b>Compressor 💧</b> feeds pneumatics on Mixer/Slicer/Packager. Its moisture accelerates their seals — one root cause, three symptoms.</li>'+
   '<li><b>One technician:</b> inspect/repair/upgrade all queue on him. Travel + work time are real; simultaneous breakdowns stack up downtime.</li>'+
   '<li><b>Predictive</b> (inspect → act on data) beats <b>preventive</b> (fixed schedule) beats <b>run-to-failure</b> (ignore).</li>'+
   '</ul></div><button class="btn go" onclick="closeReview()">Got it</button>'; $('modal').classList.add('show'); };

// canonical inspect cost helper used by sheet (attach to machine objs)
DEFS.forEach(d=>{ d.inspectionCostVal=function(){return COSTS[d.id].inspect;}; });

// ---- headless harness (for tuning/verification) ----
window.__sim = function(policy){
  newGame(); const log=[]; let lastDay=1; let dayShip=0;
  const maxTicks=C.D_MAX*C.TICKS_PER_DAY+5;
  for(let i=0;i<maxTicks;i++){
    if(policy) policy(S.day, S.tick, S, MACH);
    const preDay=S.day, prevProd=S.produced;
    stepTick();
    if(S.day!==preDay || S.over){ // a day just settled
      log.push({day:preDay, cash:Math.round(S.cash), strikes:S.strikes, health:Math.round(avgHealth()*100),
        bottleneck:S.bottleneck, moisture:+S.moisture.toFixed(2)});
    }
    if(S.over) break;
  }
  return {log,end:Math.round(S.cash),won:S.won,strikes:S.strikes,over:S.over,days:log.length};
};

// boot
newGame(); setSpeed(1); requestAnimationFrame(frame);
window.S=()=>S; window.MACH=()=>MACH;
</script>
