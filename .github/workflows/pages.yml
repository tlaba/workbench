name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site (troubleshooter is the index; Retrofit Factory 3D alongside)
        run: |
          mkdir _site
          cp troubleshooter/hydraulic-press-troubleshooter.html _site/index.html
          mkdir -p _site/retrofit3d
          cp retrofit3d/retrofit-factory-3d.html _site/retrofit3d/
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
